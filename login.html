<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập · Đại sứ WIN</title>
<style>
  :root { --navy:#1a2f6b; --navy2:#0f1d47; --gold:#f4b73f; --red:#d1362f; --bg:#f6f7fb; --ink:#1c2333; --muted:#6b7280; }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family:'Segoe UI',system-ui,sans-serif; margin:0; padding:20px;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--navy),var(--navy2));
    position:relative; overflow-x:hidden;
  }
  /* Dải sóng xanh phía dưới nền, gợi ý từ backdrop poster */
  body::before {
    content:''; position:fixed; left:0; right:0; bottom:0; height:38vh; pointer-events:none; z-index:0;
    background:
      radial-gradient(120% 90% at 22% 100%, rgba(90,200,255,.4), transparent 60%),
      radial-gradient(120% 90% at 78% 100%, rgba(40,150,230,.38), transparent 60%),
      radial-gradient(140% 100% at 50% 120%, rgba(20,110,190,.35), transparent 65%);
  }
  .card { position:relative; z-index:1; background:#fff; border-radius:18px; width:100%; max-width:380px; overflow:hidden; box-shadow:0 24px 48px rgba(0,0,0,.28); }
  .card-hero {
    background:linear-gradient(135deg,var(--navy),var(--navy2));
    background-image:linear-gradient(135deg,var(--navy),var(--navy2)),repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0 2px,transparent 2px 28px),repeating-linear-gradient(-45deg,rgba(255,255,255,.05) 0 2px,transparent 2px 28px);
    padding:26px 20px 20px; display:flex; flex-direction:column; align-items:center; gap:10px;
    border-bottom:3px solid var(--gold);
  }
  .logo-badge { display:inline-flex; align-items:center; background:#fff; border-radius:8px; padding:5px 12px; }
  .logo-badge img { height:20px; display:block; }
  .dsw-logo { display:inline-flex; align-items:center; }
  .dsw-logo img { height:56px; display:block; }
  .card-body { padding:26px 32px 32px; }
  h1 { font-size:19px; color:var(--navy); text-align:center; margin:0 0 22px; }
  label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--ink); }
  input { width:100%; padding:11px 12px; border:1px solid #dde1ea; border-radius:8px; font-size:14px; margin-bottom:14px; }
  button { width:100%; background:var(--red); color:#fff; border:none; padding:12px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:transform .12s ease,box-shadow .12s ease; }
  button:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(209,54,47,.25); }
  button.secondary { background:var(--navy); }
  .msg { font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:14px; display:none; }
  .msg.ok { background:#e6f4ea; color:#1e7e34; display:block; }
  .msg.err { background:#fdeceb; color:#b0271e; display:block; }
  .step { display:none; }
  .step.active { display:block; }
  .link { text-align:center; font-size:12px; color:var(--muted); margin-top:8px; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>
<div class="card">
  <div class="card-hero">
    <div class="logo-badge"><img src="https://datax-talent.basecdn.net/winmart/logo.png" alt="WinCommerce"></div>
    <div class="dsw-logo"><img src="https://s3.hn-2.cloud.cmctelecom.vn/rop/prod/UploadFile/2026/07/02/2026070214080186231910f253.png" alt="Đại sứ WIN"></div>
  </div>
  <div class="card-body">
    <h1>Đăng nhập</h1>
    <div id="msg" class="msg"></div>

    <!-- Bước 1: nhập email -> chọn OTP (lần đầu) hoặc mật khẩu (đã có) -->
    <div class="step active" id="stepEmail">
      <label>Email công ty</label>
      <input type="text" id="email" placeholder="ten@winmart.masangroup.com">
      <button id="btnPassword">Đăng nhập bằng mật khẩu</button>
      <div class="link" id="linkOtp">Chưa có mật khẩu? Nhận mã OTP qua email</div>
    </div>

    <!-- Bước 2a: đăng nhập bằng mật khẩu -->
    <div class="step" id="stepPassword">
      <label>Mật khẩu</label>
      <input type="password" id="password">
      <button id="btnDoLogin">Đăng nhập</button>
      <div class="link" id="linkBack1">← Quay lại</div>
    </div>

    <!-- Bước 2b: OTP lần đầu -->
    <div class="step" id="stepOtp">
      <label>Mã OTP đã gửi tới email</label>
      <input type="text" id="otp" placeholder="6 chữ số">
      <label>Tạo mật khẩu cá nhân</label>
      <input type="password" id="newPassword" placeholder="Tối thiểu 6 ký tự">
      <button id="btnSetPassword">Xác nhận & tạo mật khẩu</button>
      <div class="link" id="linkBack2">← Quay lại</div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
function showMsg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}
function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

prefillEmailDomain(document.getElementById('email'));

document.getElementById('btnPassword').onclick = () => showStep('stepPassword');
document.getElementById('linkBack1').onclick = () => showStep('stepEmail');
document.getElementById('linkBack2').onclick = () => showStep('stepEmail');

document.getElementById('linkOtp').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  if (!email) return showMsg('Vui lòng nhập email trước.', false);
  const res = await Api.requestOtp(email);
  showMsg(res.message, res.success);
  if (res.success) showStep('stepOtp');
};

document.getElementById('btnSetPassword').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const otp = document.getElementById('otp').value.trim();
  const newPassword = document.getElementById('newPassword').value;
  if (newPassword.length < 6) return showMsg('Mật khẩu tối thiểu 6 ký tự.', false);
  const res = await Api.verifyOtpSetPassword(email, otp, newPassword);
  showMsg(res.message, res.success);
  if (res.success) { showStep('stepPassword'); document.getElementById('password').value = ''; }
};

document.getElementById('btnDoLogin').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const res = await Api.login(email, password);
  if (res.success) {
    Session.save({ token: res.token, role: res.role, phamVi: res.phamVi, email, hoTen: res.hoTen });
    window.location.href = 'dashboard.html';
  } else {
    showMsg(res.message, false);
  }
};
</script>
</body>
</html>
