<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập · Đại sứ WIN</title>
<style>
  :root { --navy:#1a2f6b; --navy2:#0f1d47; --gold:#f4b73f; --red:#d1362f; --bg:#f6f7fb; --ink:#1c2333; --muted:#6b7280; }
  * { box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:linear-gradient(135deg,var(--navy),var(--navy2)); min-height:100vh; margin:0; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:#fff; border-radius:16px; padding:36px 32px; width:100%; max-width:380px; box-shadow:0 20px 40px rgba(0,0,0,.2); }
  .eyebrow { color:var(--gold); font-size:12px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; text-align:center; }
  h1 { font-size:20px; color:var(--navy); text-align:center; margin:6px 0 24px; }
  label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--ink); }
  input { width:100%; padding:11px 12px; border:1px solid #dde1ea; border-radius:8px; font-size:14px; margin-bottom:14px; }
  button { width:100%; background:var(--red); color:#fff; border:none; padding:12px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  button.secondary { background:var(--navy); }
  .msg { font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:14px; display:none; }
  .msg.ok { background:#e6f4ea; color:#1e7e34; display:block; }
  .msg.err { background:#fdeceb; color:#b0271e; display:block; }
  .step { display:none; }
  .step.active { display:block; }
  .link { text-align:center; font-size:12px; color:var(--muted); margin-top:8px; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">WinCommerce</div>
  <h1>Đăng nhập Dashboard Đại sứ WIN</h1>
  <div id="msg" class="msg"></div>

  <!-- Bước 1: nhập email -> chọn OTP (lần đầu) hoặc mật khẩu (đã có) -->
  <div class="step active" id="stepEmail">
    <label>Email công ty</label>
    <input type="text" id="email" placeholder="ten@wincommerce.vn">
    <button id="btnPassword">Đăng nhập bằng mật khẩu</button>
    <div class="link" id="linkOtp">Chưa có mật khẩu? Nhận mã OTP qua email</div>
  </div>

  <!-- Bước 2a: đăng nhập bằng mật khẩu -->
  <div class="step" id="stepPassword">
    <label>Mật khẩu</label>
    <input type="password" id="password">
    <button id="btnDoLogin">Đăng nhập</button>
    <div class="link" id="linkBack1">← Quay lại</div>
  </div>

  <!-- Bước 2b: OTP lần đầu -->
  <div class="step" id="stepOtp">
    <label>Mã OTP đã gửi tới email</label>
    <input type="text" id="otp" placeholder="6 chữ số">
    <label>Tạo mật khẩu cá nhân</label>
    <input type="password" id="newPassword" placeholder="Tối thiểu 6 ký tự">
    <button id="btnSetPassword">Xác nhận & tạo mật khẩu</button>
    <div class="link" id="linkBack2">← Quay lại</div>
  </div>
</div>

<script src="api.js"></script>
<script>
function showMsg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}
function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('btnPassword').onclick = () => showStep('stepPassword');
document.getElementById('linkBack1').onclick = () => showStep('stepEmail');
document.getElementById('linkBack2').onclick = () => showStep('stepEmail');

document.getElementById('linkOtp').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  if (!email) return showMsg('Vui lòng nhập email trước.', false);
  const res = await Api.requestOtp(email);
  showMsg(res.message, res.success);
  if (res.success) showStep('stepOtp');
};

document.getElementById('btnSetPassword').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const otp = document.getElementById('otp').value.trim();
  const newPassword = document.getElementById('newPassword').value;
  if (newPassword.length < 6) return showMsg('Mật khẩu tối thiểu 6 ký tự.', false);
  const res = await Api.verifyOtpSetPassword(email, otp, newPassword);
  showMsg(res.message, res.success);
  if (res.success) { showStep('stepPassword'); document.getElementById('password').value = ''; }
};

document.getElementById('btnDoLogin').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const res = await Api.login(email, password);
  if (res.success) {
    Session.save({ token: res.token, role: res.role, phamVi: res.phamVi, email, hoTen: res.hoTen });
    window.location.href = 'dashboard.html';
  } else {
    showMsg(res.message, false);
  }
};
</script>
</body>
</html>
